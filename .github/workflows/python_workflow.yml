name: Flask_app

on: 
  push:
    branches:
      - main

jobs:
  Flask_python:
     runs-on: ubuntu-latest
     steps:
       - name: "this would clone the code to the runner"
         uses: actions/checkout@v6.0.2

       - name: "Installing python here"
         uses: actions/setup-python@v6.2.0

       - name: "insatalling all of the required dependencies using requirement.txt file"
         run: |
           python -m pip install --upgrade pip
           pip install -r requirements.txt

       - name: "Running the python app in this step!!"
         run: python app.py

       - name: "Verifying if the app is running fine"
         run: |
           curl http://127.0.0.1:5000
           echo "Verification is done"
         
  
